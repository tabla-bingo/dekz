<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Página no encontrada</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0d1b2a;
      --panel:     #111f2e;
      --border:    rgba(255,255,255,.08);
      --text:      #e8e8e8;
      --muted:     #6b7a8d;
      --gold:      #f5c842;
      --gold-dark: #c9a12e;
      --red:       #e8272a;
      --green:     #1db954;
      --radius:    14px;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    /* ── animated background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,200,66,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,66,.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridDrift {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    /* ── radial glow center ── */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(245,200,66,.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 24px;
      text-align: center;
    }

    /* ── die face ── */
    .die {
      width: 90px;
      height: 90px;
      background: var(--panel);
      border: 2px solid rgba(245,200,66,.25);
      border-radius: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      padding: 14px;
      gap: 6px;
      margin-bottom: 36px;
      box-shadow: 0 0 40px rgba(245,200,66,.1), inset 0 1px 0 rgba(255,255,255,.06);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%       { transform: translateY(-10px) rotate(2deg); }
    }

    .dot {
      width: 100%;
      aspect-ratio: 1;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(245,200,66,.6);
    }

    /* ── 4 dots on die (like a 4-face) ── */
    .dot:nth-child(1) { grid-area: 1 / 1; }
    .dot:nth-child(2) { grid-area: 1 / 3; }
    .dot:nth-child(3) { grid-area: 3 / 1; }
    .dot:nth-child(4) { grid-area: 3 / 3; }

    /* ── big 404 ── */
    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 20vw, 12rem);
      color: var(--gold);
      line-height: 1;
      letter-spacing: 6px;
      text-shadow: 0 0 80px rgba(245,200,66,.2);
      animation: flicker 6s ease-in-out infinite;
    }

    @keyframes flicker {
      0%, 94%, 96%, 98%, 100% { opacity: 1; }
      95%, 97% { opacity: .7; }
    }

    .label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 4px;
      color: var(--muted);
      margin-top: 4px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .message {
      font-size: .95rem;
      color: var(--muted);
      max-width: 360px;
      line-height: 1.65;
      margin-bottom: 36px;
    }

    .message strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── pill badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,200,66,.07);
      border: 1px solid rgba(245,200,66,.2);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: .78rem;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: .5px;
      margin-bottom: 28px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,200,66,.2); }
      50%       { box-shadow: 0 0 0 6px rgba(245,200,66,.0); }
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      background: var(--gold);
      border-radius: 50%;
    }

    /* ── back button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 32px;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
      box-shadow: 0 4px 24px rgba(245,200,66,.25);
    }

    .btn:hover {
      background: var(--gold-dark);
      transform: scale(1.03);
      box-shadow: 0 6px 32px rgba(245,200,66,.35);
    }

    /* ── scattered tiles (decorative) ── */
    .tiles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .tile {
      position: absolute;
      background: rgba(245,200,66,.04);
      border: 1px solid rgba(245,200,66,.06);
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: rgba(245,200,66,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      animation: tileFloat var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    @keyframes tileFloat {
      0%, 100% { transform: translateY(0) rotate(var(--rot)); opacity: .6; }
      50%       { transform: translateY(-16px) rotate(calc(var(--rot) + 4deg)); opacity: 1; }
    }

    @media (max-width: 480px) {
      .die { width: 70px; height: 70px; padding: 10px; }
      .tile { display: none; }
    }
  </style>
</head>
<body>

  <!-- decorative scattered number tiles -->
  <div class="tiles" aria-hidden="true">
    <div class="tile" style="top:8%;  left:6%;  --dur:4.1s; --delay:0s;    --rot:-8deg">7</div>
    <div class="tile" style="top:12%; right:8%; --dur:5.3s; --delay:.4s;   --rot:5deg">23</div>
    <div class="tile" style="top:72%; left:4%;  --dur:4.7s; --delay:.8s;   --rot:-12deg">45</div>
    <div class="tile" style="top:78%; right:6%; --dur:5.8s; --delay:1.2s;  --rot:9deg">12</div>
    <div class="tile" style="top:30%; left:2%;  --dur:6.1s; --delay:.2s;   --rot:3deg">88</div>
    <div class="tile" style="top:55%; right:3%; --dur:4.4s; --delay:1.6s;  --rot:-6deg">31</div>
    <div class="tile" style="top:20%; left:14%; --dur:5.0s; --delay:.6s;   --rot:14deg">60</div>
    <div class="tile" style="top:85%; left:20%; --dur:4.9s; --delay:1.0s;  --rot:-4deg">9</div>
    <div class="tile" style="top:65%; right:15%;--dur:5.5s; --delay:.3s;   --rot:7deg">77</div>
    <div class="tile" style="top:40%; left:8%;  --dur:6.3s; --delay:1.8s;  --rot:-10deg">54</div>
  </div>

  <main class="page">

    <div class="die" aria-hidden="true">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="code">404</div>
    <div class="label">Página no encontrada</div>

    <p class="message">
      Esta página <strong>no existe</strong>.<br>
      La página que buscas no existe o fue eliminada.
    </p>

    <a href="/" class="btn">
      🎲 Volver al juego
    </a>

  </main>

</body>
</html>
